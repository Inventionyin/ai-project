<template>
  <div class="ai-test-container" style="max-width: 1600px; margin: 0 auto; padding: 20px;">
    <!-- 页面标题 -->
    <div class="header" style="margin-bottom: 24px;">
      <h2>AI 智能接口测试生成平台</h2>
      <p style="color: #666;">上传接口文档 → 自动生成接口测试用例 & 性能测试脚本</p>
    </div>

    <!-- 接口文档输入区域 -->
    <div class="input-section" style="margin-bottom: 24px;">
      <el-card shadow="hover" title="接口文档输入（支持粘贴JSON/YAML/Markdown）">
        <template #extra>
          <el-upload
            :auto-upload="false"
            :on-change="handleFileUpload"
            accept=".md,.json,.yaml,.yml"
            style="margin-right: 8px;"
          >
            <el-button type="primary" size="small">上传文档</el-button>
          </el-upload>
          <el-button size="small" @click="clearInput">清空输入</el-button>
        </template>

        <el-input
          v-model="apiDocContent"
          type="textarea"
          :rows="8"
          placeholder="请粘贴接口文档内容（如 Swagger/OpenAPI/Markdown 格式）"
          style="width: 100%;"
        />
      </el-card>
    </div>

    <!-- 生成按钮区域 -->
    <div class="action-buttons" style="display: flex; gap: 16px; margin-bottom: 24px;">
      <el-button
        type="primary"
        size="default"
        :loading="generating.case"
        @click="generateTestCase"
        style="flex: 1;"
      >
        调用智能体 → 生成接口测试用例
      </el-button>
      <el-button
        type="success"
        size="default"
        :loading="generating.script"
        @click="generatePerfScript"
        style="flex: 1;"
      >
        调用智能体 → 生成性能测试脚本
      </el-button>
    </div>

    <!-- 结果展示双面板 -->
    <div class="result-panel" style="display: flex; gap: 20px;">
      <!-- 左侧：接口测试用例 -->
      <el-card shadow="hover" title="接口测试用例" style="flex: 1;">
        <template #extra>
          <el-button size="small" icon="CopyDocument" @click="copyResult('case')">复制</el-button>
          <el-button size="small" icon="Download" @click="downloadResult('case')">下载</el-button>
          <el-button size="small" text @click="clearResult('case')">清空</el-button>
        </template>

        <el-scrollbar height="600px">
          <pre class="code-content">{{ testCaseResult }}</pre>
        </el-scrollbar>
      </el-card>

      <!-- 右侧：性能测试脚本 -->
      <el-card shadow="hover" title="性能测试脚本" style="flex: 1;">
        <template #extra>
          <el-button size="small" icon="CopyDocument" @click="copyResult('script')">复制</el-button>
          <el-button size="small" icon="Download" @click="downloadResult('script')">下载</el-button>
          <el-button size="small" text @click="clearResult('script')">清空</el-button>
        </template>

        <el-scrollbar height="600px">
          <pre class="code-content">{{ perfScriptResult }}</pre>
        </el-scrollbar>
      </el-card>
    </div>
  </div>
</template>

<script setup>
import { ref, reactive } from 'vue'
import { ElMessage } from 'element-plus'
import axios from 'axios'

// 接口文档内容
const apiDocContent = ref('')

// 生成结果
const testCaseResult = ref('')
const perfScriptResult = ref('')

// 加载状态
const generating = reactive({
  case: false,
  script: false
})

// ============== 核心功能 ==============
// 上传文件读取
const handleFileUpload = (file) => {
  const reader = new FileReader()
  reader.onload = (e) => {
    apiDocContent.value = e.target.result
  }
  reader.readAsText(file.raw)
}

// 清空输入框
const clearInput = () => {
  apiDocContent.value = ''
  ElMessage.success('已清空输入内容')
}

// 生成接口测试用例（调用你的智能体1）
const generateTestCase = async () => {
  if (!apiDocContent.value) {
    ElMessage.warning('请先输入或上传接口文档')
    return
  }
  generating.case = true
  try {
    // 替换为你的智能体接口地址
    const res = await axios.post('http://localhost:8080/api/generate-test-case', {
      apiDoc: apiDocContent.value
    })
    testCaseResult.value = res.data
    ElMessage.success('接口测试用例生成成功')
  } catch (err) {
    ElMessage.error('生成失败：' + err.message)
  } finally {
    generating.case = false
  }
}

// 生成性能测试脚本（调用你的智能体2）
const generatePerfScript = async () => {
  if (!apiDocContent.value) {
    ElMessage.warning('请先输入或上传接口文档')
    return
  }
  generating.script = true
  try {
    // 替换为你的性能脚本智能体接口
    const res = await axios.post('http://localhost:8080/api/generate-perf-script', {
      apiDoc: apiDocContent.value
    })
    perfScriptResult.value = res.data
    ElMessage.success('性能测试脚本生成成功')
  } catch (err) {
    ElMessage.error('生成失败：' + err.message)
  } finally {
    generating.script = false
  }
}

// ============== 工具函数 ==============
// 复制结果
const copyResult = (type) => {
  const content = type === 'case' ? testCaseResult.value : perfScriptResult.value
  navigator.clipboard.writeText(content)
  ElMessage.success('已复制到剪贴板')
}

// 下载文件
const downloadResult = (type) => {
  const content = type === 'case' ? testCaseResult.value : perfScriptResult.value
  const fileName = type === 'case' ? '接口测试用例.md' : '性能测试脚本.jmx'
  
  const blob = new Blob([content], { type: 'text/plain' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = fileName
  a.click()
  URL.revokeObjectURL(url)
  ElMessage.success('文件已下载')
}

// 清空结果
const clearResult = (type) => {
  if (type === 'case') testCaseResult.value = ''
  else perfScriptResult.value = ''
  ElMessage.success('已清空结果')
}
</script>

<style scoped>
.code-content {
  background: #f7f8fa;
  padding: 16px;
  border-radius: 4px;
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: Consolas, "Courier New", monospace;
  font-size: 13px;
}
</style>
