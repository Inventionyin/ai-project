name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: 123456
          POSTGRES_DB: ai_test_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: ai-project-back-end
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run focused backend tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_auth_header_impersonation.py tests/test_trial_operation_dashboard_api.py tests/test_platform_records_api.py -q

      - name: Run backend database E2E tests
        env:
          PYTHONPATH: .
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:123456@localhost:5432/ai_test_e2e
        run: |
          pytest tests/e2e -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-project_front_end
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-project_front_end/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
